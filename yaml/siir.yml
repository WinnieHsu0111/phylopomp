name: SIIR
description: Two-strain SIR model
details: |-
  Two distinct pathogen strains compete for susceptibles.
demes:
  - strain1
  - strain2
parameter:
  Beta1:
    name: Beta1
    description: transmission rate for strain 1
    type: double
    default: 5
  Beta2:
    name: Beta2
    description: transmission rate for strain 2
    type: double
    default: 5
  gamma:
    name: gamma
    description: recovery rate
    type: double
    default: 1
  psi1:
    name: psi1
    description: sampling rate for deme 1
    default: 1
    type: double
  psi2:
    name: psi2
    description: sampling rate for deme 2
    default: 0
    type: double
  sigma12:
    name: sigma12
    description: rate of movement from deme 1 to deme 2
    default: 0
    type: double
  sigma21:
    name: sigma21
    description: rate of movement from deme 2 to deme 1
    default: 0
    type: double
  omega:
    name: omega
    description: rate of loss of immunity
    default: 0
    type: double
ivp:
  pop:
    name: pop
    description: population size
    type: double
    default: 500
  S_0:
    name: S_0
    description: initial fraction of susceptible population
    default: 0.96
    type: double
  I1_0:
    name: I1_0
    description: initial fraction of deme-1 infected population
    default: 0.02
    type: double
  I2_0:
    name: I2_0
    description: initial fraction of deme-2 infected population
    default: 0.02
    type: double
  R_0:
    name: R_0
    description: initial fraction of immune population
    default: 0
    type: double
state:
  S:
    name: S
    type: int
  I1:
    name: I1
    type: int
  I2:
    name: I2
    type: int
  R:
    name: R
    type: int
rinit: |-
  double f = params.pop/(params.S_0+params.I1_0+params.I2_0+params.R_0);
  state.S = nearbyint(f*params.S_0);
  state.I1 = nearbyint(f*params.I1_0);
  state.I2 = nearbyint(f*params.I2_0);
  state.R = nearbyint(f*params.R_0);
  graft(strain1,state.I1);
  graft(strain2,state.I2);
events:
  I1infect:
    rate: params.Beta1 * state.S * state.I1 / params.pop
    jump: state.S -= 1; state.I1 += 1; birth(strain1,strain1);
  I2infect:
    rate: params.Beta2 * state.S * state.I2 / params.pop
    jump: state.S -= 1; state.I2 += 1; birth(strain2,strain2);
  I1recov:
    jump: state.I1 -= 1; state.R += 1; death(strain1);
    rate: params.gamma * state.I1
  I2recov:
    jump: state.I2 -= 1; state.R += 1; death(strain2);
    rate: params.gamma * state.I2
  sample1:
    rate: params.psi1 * state.I1
    jump: sample(strain1);
  sample2:
    rate: params.psi2 * state.I2
    jump: sample(strain2);
  move12:
    jump: state.I1 -= 1; state.I2 += 1; migrate(strain1,strain2);
    rate: params.sigma12 * state.I1
  move21:
    jump: state.I1 += 1; state.I2 -= 1; migrate(strain2,strain1);
    rate: params.sigma21 * state.I2
  wane:
    jump: state.S += 1; state.R -= 1;
    rate: params.omega * state.R
