name: BDEI
description: Linear birth-death with exposed and infectious classes
details: |-
  Two-deme linear birth-death process with exposed (incubating) and infectious lineages.
  Transmission creates exposed offspring from infectious donors; exposed lineages progress to infectious.
  Removal and Stadler sampling-on-removal apply to infectious lineages only.
  Compatible with the BDEI model of Voznica et al. (2022), https://doi.org/10.1038/s41467-022-31511-0,
  and structured linear birth-death theory (Stadler 2010, https://doi.org/10.1016/j.jtbi.2010.09.010;
  King et al. 2024, https://arxiv.org/abs/2405.17032).
  YAML rate defaults are midpoints of the PhyloDeep training priors
  (R0 in [1.1, 3.5], T_I in [1, 5], T_E/T_I in [0.2, 5], p in [0.01, 1]).
demes:
  - exposed
  - infectious
parameter:
  mu:
    name: mu
    description: per capita progression rate from exposed to infectious
    type: double
    default: 0.128205128205128
  lambda_ie:
    name: lambda_ie
    description: per capita transmission rate from infectious to exposed
    type: double
    default: 0.766666666666667
  psi:
    name: psi
    description: per capita removal rate of infectious lineages
    type: double
    default: 0.333333333333333
  p:
    name: p
    description: probability of sampling upon infectious removal
    type: double
    default: 0.505
ivp:
  pop:
    name: pop
    description: reference population size for scaling initial lineage counts
    default: 1
    type: double
  fe:
    name: fe
    description: initial fraction of exposed lineages (ie/pop)
    default: 0
    type: double
  fi:
    name: fi
    description: initial fraction of infectious lineages (ii/pop)
    default: 1
    type: double
state:
  IE:
    name: IE
    type: int
  II:
    name: II
    type: int
rinit: |-
    double denom = params.fe + params.fi;
    if (denom > 0) {
      state.IE = nearbyint((params.fe * params.pop) / denom);
      state.II = nearbyint((params.fi * params.pop) / denom);
    } else {
      state.IE = 0;
      state.II = 1;
    }
    if (state.IE > 0) graft(exposed, state.IE);
    if (state.II > 0) graft(infectious, state.II);
events:
  progress:
    rate: params.mu * state.IE
    jump: state.IE -= 1; state.II += 1; migrate(exposed, infectious);
  birth:
    rate: params.lambda_ie * state.II
    jump: state.IE += 1; birth(infectious, exposed);
  death:
    rate: params.psi * (1 - params.p) * state.II
    jump: state.II -= 1; death(infectious);
  sample_death:
    rate: params.psi * params.p * state.II
    jump: state.II -= 1; sample_death(infectious);
