name: BDEI
description: Linear birth-death with exposed and infectious classes
details: |-
  Two-deme linear birth-death process with exposed (incubating) and infectious lineages.
  Transmission creates exposed offspring from infectious donors; exposed lineages progress to infectious.
  Removal and Stadler sampling-on-removal apply to infectious lineages only.
  Compatible with the BDEI model of Voznica et al. (2022, https://doi.org/10.1038/s41467-022-31511-0),
  and structured linear birth-death theory (Stadler 2010, https://doi.org/10.1016/j.jtbi.2010.09.010;
  King et al. 2024, https://arxiv.org/abs/2405.17032).
demes:
  - exposed
  - infectious
parameter:
  mu:
    name: sigma
    description: per capita progression rate (exposed to infectious)
    type: double
    default: 1/7
  lambda:
    name: lambda
    description: per capita reproduction rate
    type: double
    default: 7/9
  psi:
    name: mu
    description: per capita removal rate (of infectious lineages)
    type: double
    default: 1/6
  chi:
    name: chi
    description: (destructive) sampling rate
    type: double
    default: 1/6
ivp:
  pop:
    name: pop
    description: initial population size
    default: 1
    type: double
  E0:
    name: E0
    description: initial fraction of exposed lineages
    default: 0
    type: double
  I0:
    name: I0
    description: initial fraction of infectious lineages
    default: 1
    type: double
state:
  E:
    name: E
    description: number of lineages in the exposed class
    type: int
  I:
    name: I
    description: number of lineages in the infectious class
    type: int
rinit: |-
    double m = params.pop/(params.E0 + params.I0);
    state.E = nearbyint(m*params.E0);
    state.I = nearbyint(m*params.I0);
    graft(exposed, state.E);
    graft(infectious, state.I);
events:
  progress:
    rate: params.sigma * state.E
    jump: state.E -= 1; state.I += 1; migrate(exposed, infectious);
  birth:
    rate: params.lambda * state.I
    jump: state.E += 1; birth(infectious, exposed);
  death:
    rate: params.mu * state.I
    jump: state.I -= 1; death(infectious);
  sample_death:
    rate: params.chi * state.I
    jump: state.I -= 1; sample_death(infectious);
