name: SEIR
description: Classical susceptible-exposed-infected-recovered model
details: |-
  The population is structured by infection progression.
  There is an incubation period that must pass before an infected
  host becomes infectious. The duration of this period is \\eqn{1/\\sigma}.
  The infectious period is \\eqn{1/\\gamma}.
demes:
  - Exposed
  - Infectious
parameter:
  Beta:
    name: Beta
    description: transmission rate
    type: double
    default: 4
  sigma:
    name: sigma
    description: progression rate
    type: double
    default: 1
  gamma:
    name: gamma
    description: recovery rate
    type: double
    default: 1
  psi:
    name: psi
    description: per capita non-destructive sampling rate
    default: 1
    type: double
  chi:
    name: chi
    description: per capita destructive sampling rate
    default: 0
    type: double
  omega:
    name: omega
    description: rate of waning of immunity
    default: 0
    type: double
ivp:
  pop:
    name: pop
    description: host population size
    default: 100
    type: double
  S0:
    name: S0
    description: initial fraction of population susceptible to infection
    default: 0.9
    type: double
  E_0:
    name: E0
    description: initial fraction of population in exposed class
    default: 0.05
    type: double
  I_0:
    name: I0
    description: initial fraction of population in infectious class
    default: 0.05
    type: double
  R0:
    name: R0
    description: initial fraction of population immune to infection
    default: 0
    type: double
state:
  S:
    name: S
    type: int
  E:
    name: E
    type: int
  I:
    name: I
    type: int
  R:
    name: R
    type: int
rinit: |-
  double f = params.pop/(params.S0+params.E0+params.I0+params.R0);
  state.S = nearbyint(f*params.S0);
  state.E = nearbyint(f*params.E0);
  state.I = nearbyint(f*params.I0);
  state.R = nearbyint(f*params.R0);
  graft(Exposed,state.E);
  graft(Infectious,state.I);
events:
  infect:
    rate: params.Beta * state.S * state.I / params.pop
    jump: state.S -= 1; state.E += 1; birth(Infectious,Exposed);
  progress:
    jump: state.E -= 1; state.I += 1; migrate(Exposed,Infectious);
    rate: params.sigma * state.E
  recov:
    jump: state.I -= 1; state.R += 1; death(Infectious);
    rate: params.gamma * state.I
  dsample:
    rate: params.chi * state.I
    jump: state.I -= 1; sample_death(Infectious);
  sample:
    rate: params.psi * state.I
    jump: sample(Infectious);
  waning:
    jump: state.R -= 1; state.S += 1;
    rate: params.omega * state.R
