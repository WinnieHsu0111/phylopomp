name: BDSS
description: Linear birth-death with superspreading
details: |-
  Two-deme linear birth-death process with heterogeneous per-lineage transmission rates.
  Identical to the BDSS model of Voznica et al. (2022, https://doi.org/10.1038/s41467-022-31511-0), though the parameterization differs.
demes:
  - normal
  - superspreader
parameter:
  lambda_nn:
    name: lambda_nn
    description: normal-to-normal transmission rate
    type: double
    default: 0.875
  lambda_ns:
    name: lambda_ns
    description: normal-to-superspreader transmission rate
    type: double
    default: 0.125
  lambda_sn:
    name: lambda_sn
    description: superspreader-to-normal transmission rate
    type: double
    default: 5.5
  lambda_ss:
    name: lambda_ss
    description: superspreader-to-superspreader transmission rate
    type: double
    default: 0.75
  mu:
    name: mu
    description: per capita removal (death or recovery) rate
    type: double
    default: 0.5
  chi:
    name: chi
    description: per capita destructive sampling rate
    type: double
    default: 0.5
ivp:
  pop:
    name: pop
    description: initial population size
    default: 1
    type: double
  IN0:
    name: N0
    description: initial fraction of normal spreaders
    default: 1
    type: double
  IS0:
    name: S0
    description: initial fraction of superspreaders
    default: 0
    type: double
state:
  IN:
    name: 'N'
    type: int
  IS:
    name: 'S'
    type: int
rinit: |-
    double m = params.pop/(params.N0 + params.S0);
    state.N = nearbyint(m*params.N0);
    state.S = nearbyint(m*params.S0);
    graft(normal, state.N);
    graft(superspreader, state.S);
events:
  birth_nn:
    rate: params.lambda_nn * state.N
    jump: state.N += 1; birth(normal, normal);
  birth_ns:
    rate: params.lambda_ns * state.N
    jump: state.S += 1; birth(normal, superspreader);
  birth_sn:
    rate: params.lambda_sn * state.S
    jump: state.N += 1; birth(superspreader, normal);
  birth_ss:
    rate: params.lambda_ss * state.S
    jump: state.S += 1; birth(superspreader, superspreader);
  death_n:
    rate: params.mu * state.N
    jump: state.N -= 1; death(normal);
  death_s:
    rate: params.mu * state.S
    jump: state.S -= 1; death(superspreader);
  sample_death_n:
    rate: params.chi * state.N
    jump: state.N -= 1; sample_death(normal);
  sample_death_s:
    rate: params.chi * state.S
    jump: state.S -= 1; sample_death(superspreader);
